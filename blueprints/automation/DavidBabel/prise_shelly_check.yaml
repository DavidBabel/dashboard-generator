blueprint:
  name: "🔍 Surveillance Connexion Prise Shelly"
  description: >
    Envoie une alerte lorsqu'une prise Shelly est hors ligne pendant une durée configurable
    et notifie quand elle revient en ligne.
  domain: automation
  input:
    device_sensor:
      name: Capteur de connexion
      description: Le capteur binaire qui indique l'état de connexion de la prise Shelly
      default: binary_sensor.prise_shelly_connexion
      selector:
        entity:
          domain: binary_sensor
    appartement:
      name: Appartement
      description: Sélectionnez l'appartement concerné
      default: "Engel"
      selector:
        select:
          options:
            - "Engel"
            - "Romains"
            - "Carmes"
    offline_duration:
      name: Durée hors ligne avant alerte
      description: Temps d'attente avant d'envoyer l'alerte de déconnexion
      default: 10
      selector:
        number:
          min: 1
          max: 120
          unit_of_measurement: minutes
    notify_device:
      name: Device à notifier
      description: >
        Le device doit utiliser l'application mobile officielle Home Assistant.
      selector:
        device:
          filter:
            integration: mobile_app

mode: restart

variables:
  appartement: !input appartement
  notify_device: !input notify_device
  notify_service: >
    notify.mobile_app_{{ device_attr(notify_device, 'name')
      | lower
      | replace(' ', '_')
      | replace('-', '_') }}
  device_name: "Prise Shelly {{ appartement }}"
  notification_tag: "alerte_shelly_{{ appartement | lower }}"
  offline_duration: !input offline_duration

trigger:
  - platform: state
    entity_id: !input device_sensor
    to: "off"
    for:
      minutes: !input offline_duration
    id: debranche
  - platform: state
    entity_id: !input device_sensor
    from: "off"
    to: "on"
    id: rebranche

action:
  - choose:
      - conditions:
          - condition: trigger
            id: debranche
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "🔌 {{ device_name }}"
              message: "La prise Shelly est hors ligne depuis {{ offline_duration }} minutes"
              data:
                notification_icon: mdi:power-plug-off
                tag: "{{ notification_tag }}"
                url: /batteries-check/
                clickAction: /batteries-check/
      - conditions:
          - condition: trigger
            id: rebranche
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "🔌 {{ device_name }}"
              message: "La prise Shelly est de nouveau connectée ✅"
              data:
                notification_icon: mdi:power-plug
                tag: "{{ notification_tag }}"
                url: /batteries-check/
                clickAction: /batteries-check/
