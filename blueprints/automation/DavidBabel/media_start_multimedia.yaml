# Version: 1.0.1
# 🧪 to test : many update
# Appartement: Carmes
blueprint:
  name: "Contrôle Cinéma Epson & Shield"
  description: >
    "Version: 1.0.0
    *📽️ Allume le projecteur avec la Shield et l'éteint (double clic) via la Shield ou un bouton."
  domain: automation
  input:
    shield_player:
      name: "NVIDIA Shield"
      description: "L'entité Media Player de votre Shield."
      selector:
        entity:
          filter:
            domain: media_player
            device_class: receiver # Souvent le cas pour Android TV
    projecteur_broadlink:
      name: "Projecteur (Broadlink)"
      description: "L'entité créée par Broadlink Manager."
      selector:
        entity:
          filter:
            domain: media_player
    bouton_externe:
      name: "Bouton d'extinction (Optionnel)"
      description: "Un bouton ou sensor pour éteindre manuellement."
      default: []
      selector:
        entity:
          filter:
            # On filtre sur les sensors d'action (Z2M)
            domain: sensor

mode: restart

trigger:
  # Trigger Shield ON
  - platform: state
    entity_id: !input shield_player
    from: ["off", "standby"]
    to: "on"
    id: "allumage"
  # Trigger Shield OFF
  - platform: state
    entity_id: !input shield_player
    from: "on"
    to: ["off", "standby"]
    id: "extinction"
  # Trigger Bouton Manuel
  - platform: state
    entity_id: !input bouton_externe
    id: "extinction"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "allumage"
        sequence:
          - action: media_player.turn_on
            target:
              entity_id: !input projecteur_broadlink
      - conditions:
          - condition: trigger
            id: "extinction"
        sequence:
          # Séquence spécifique Epson
          - action: media_player.turn_off
            target:
              entity_id: !input projecteur_broadlink
          - delay: "00:00:01"
          - action: media_player.turn_off
            target:
              entity_id: !input projecteur_broadlink
