# Version: 1.0.5
# 🧪 to test : first working example
# 🧪 Contrôle Shield + bouton Hue -> switches Broadlink Manager (b64)
# Appartement: Carmes
blueprint:
  name: "Contrôle Cinéma Epson & Shield"
  description: >
    Version: 1.0.5
    📽️ Allume le projecteur Epson et l’ampli Denon via la Shield ou un bouton Hue,
    et les éteint (double OFF Epson).

    Conçu pour fonctionner avec les entités `template switch` auto-générées par Broadlink Manager
    (celles qui font déjà `remote.send_command` avec `command: b64:...`).
  domain: automation
  input:
    shield_player:
      name: "NVIDIA Shield"
      description: "L'entité Media Player de votre Shield."
      default: media_player.nvidia_shield
      selector:
        entity:
          filter:
            domain: media_player
    epson_switch:
      name: "Projecteur Epson (switch Broadlink Manager)"
      description: "Ex: switch.broadlink_epson_eh_tw7100"
      default: switch.broadlink_epson_eh_tw7100
      selector:
        entity:
          filter:
            domain: switch
    denon_switch:
      name: "Ampli Denon (switch Broadlink Manager)"
      description: "Ex: switch.broadlink_denon_avr_x2800h"
      default: switch.broadlink_denon_avr_x2800h
      selector:
        entity:
          filter:
            domain: switch
    hue_remote_device:
      name: "Bouton Philips Hue"
      description: "Le device du bouton Hue (déclenchement court sur ON)."
      default: 2d36d0122f150f4c3fc80db0f293d4c0
      selector:
        device:
          integration: hue

mode: restart

trigger:
  # Trigger Shield ON
  - platform: state
    entity_id: !input shield_player
    from: ["off", "standby"]
    to: "on"
    id: "allumage"
  # Trigger Shield OFF
  - platform: state
    entity_id: !input shield_player
    from: "on"
    to: ["off", "standby"]
    id: "extinction"
  # Trigger Bouton Hue (ON)
  - platform: device
    device_id: !input hue_remote_device
    domain: hue
    type: short_release
    subtype: 1
    id: "allumage"
  # Trigger Bouton Hue (long press ON)
  - platform: device
    device_id: !input hue_remote_device
    domain: hue
    type: long_press
    subtype: 1
    id: "extinction"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "allumage"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input epson_switch
          - action: switch.turn_on
            target:
              entity_id: !input denon_switch
          - delay: "00:00:10"

      - conditions:
          - condition: trigger
            id: "extinction"
        sequence:
          # Séquence spécifique Epson
          - action: switch.turn_off
            target:
              entity_id: !input denon_switch
          - delay: "00:00:07"
          - action: switch.turn_off
            target:
              entity_id: !input epson_switch
          - delay: "00:00:02"
          - action: switch.turn_off
            target:
              entity_id: !input epson_switch
          - delay: "00:00:02"
          - action: switch.turn_off
            target:
              entity_id: !input epson_switch
          - delay: "00:00:02"
          - action: switch.turn_off
            target:
              entity_id: !input epson_switch
