# Version: 1.0.2
# 🧪 to test : working on multimedia
# Appartement: Carmes
blueprint:
  name: "Contrôle Cinéma Epson & Shield"
  description: >
    Version: 1.0.2
    📽️ Allume le projecteur avec la Shield et l'éteint (double clic) via la Shield ou un bouton.
  domain: automation
  input:
    shield_player:
      name: "NVIDIA Shield"
      description: "L'entité Media Player de votre Shield."
      default: media_player.nvidia_shield
      selector:
        entity:
          filter:
            domain: media_player
            device_class: receiver # Souvent le cas pour Android TV
    projecteur_broadlink:
      name: "Projecteur (Broadlink)"
      description: "Une ou plusieurs entités à allumer/éteindre (ex: projecteur, ampli)."
      default:
        entity_id:
          - media_player.epson_eh_tw7100
          - media_player.denon_avr_x2800h_3
      selector:
        target:
          entity:
            domain: media_player
    hue_remote_device:
      name: "Bouton Philips Hue"
      description: "Le device du bouton Hue (déclenchement court sur ON)."
      default: 2d36d0122f150f4c3fc80db0f293d4c0
      selector:
        device:
          integration: hue

mode: restart

trigger:
  # Trigger Shield ON
  - platform: state
    entity_id: !input shield_player
    from: ["off", "standby"]
    to: "on"
    id: "allumage"
  # Trigger Bouton Hue (ON)
  - platform: device
    device_id: !input hue_remote_device
    domain: hue
    type: remote_button_short_release
    subtype: turn_on
    id: "allumage"
  # Trigger Bouton Hue (double clic ON)
  - platform: device
    device_id: !input hue_remote_device
    domain: hue
    type: remote_button_double_press
    subtype: turn_on
    id: "extinction"
  # Trigger Shield OFF
  - platform: state
    entity_id: !input shield_player
    from: "on"
    to: ["off", "standby"]
    id: "extinction"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "allumage"
        sequence:
          - action: media_player.turn_on
            target: !input projecteur_broadlink
      - conditions:
          - condition: trigger
            id: "extinction"
        sequence:
          # Séquence spécifique Epson
          - action: media_player.turn_off
            target: !input projecteur_broadlink
          - delay: "00:00:02"
          - action: media_player.turn_off
            target: !input projecteur_broadlink
