blueprint:
  name: "🕵️ Surveillance Débranchement Vanne Danfoss Ally"
  description: >
    Détecte et alerte lorsqu'une vanne thermostatique Danfoss Ally a été débranchée,
    dévissée du radiateur ou devient inaccessible.

    La vanne Danfoss Ally possède un capteur interne `mounted_mode_active` qui indique
    si elle est correctement installée sur le radiateur. Ce blueprint surveille cet état
    et vous prévient en cas de problème.
  domain: automation
  # ==============================================================================
  # INPUTS - Configuration des paramètres du blueprint
  # ==============================================================================
  input:
    # --------------------------------------------------------------------------
    # Vanne Danfoss Ally : sensor de détection de montage
    # Type attendu : binary_sensor.xxx_mounted_mode_active
    # Valeur attendue : on = montée, off = démontée, unavailable = hors ligne
    # Trouver via : Outils de développement > États > rechercher "mounted"
    # --------------------------------------------------------------------------
    vanne_entity:
      name: Vanne Danfoss Ally
      description: >
        Sélectionnez l'entité binary_sensor correspondant au mode de montage de votre vanne
        (généralement nommée binary_sensor.xxx_mounted_mode_active ou binary_sensor.xxx_mounted_mode_control).
        Si vous ne trouvez pas cette entité, vérifiez dans les outils de développement de Home Assistant.
      selector:
        entity:
          domain: binary_sensor

    # --------------------------------------------------------------------------
    # Nom de la vanne : identification pour les notifications
    # Type attendu : texte libre
    # Valeur attendue : nom de la pièce ou du radiateur (ex: "Salon", "Chambre")
    # --------------------------------------------------------------------------
    vanne_name:
      name: Nom de la vanne
      description: Nom de la pièce ou du radiateur pour personnaliser les notifications (ex. "Salon", "Chambre parentale")
      default: "la vanne"
      selector:
        text:

    # --------------------------------------------------------------------------
    # Device de notification : appareil mobile recevant les alertes critiques
    # Type attendu : device avec l'app mobile Home Assistant installée
    # --------------------------------------------------------------------------
    notify_device:
      name: Device à notifier
      description: >
        Le device doit utiliser l'application mobile officielle Home Assistant.
        Les notifications seront envoyées en mode critique (iOS) avec priorité haute.
      selector:
        device:
          filter:
            integration: mobile_app

    # --------------------------------------------------------------------------
    # Vérifier l'inaccessibilité : activer l'alerte pour vanne hors ligne
    # Type attendu : booléen
    # Valeur attendue : true = surveiller aussi l'inaccessibilité, false = ignorer
    # --------------------------------------------------------------------------
    check_unavailable:
      name: Vérifier l'inaccessibilité
      description: >
        Activer une alerte supplémentaire si la vanne devient inaccessible (hors ligne).
        Utile pour détecter les problèmes de pile ou de connexion Zigbee.
      default: true
      selector:
        boolean:

    # --------------------------------------------------------------------------
    # Délai avant alerte d'inaccessibilité : temps d'attente pour éviter fausses alertes
    # Type attendu : nombre entier
    # Valeur attendue : durée en minutes (recommandé : 5)
    # --------------------------------------------------------------------------
    unavailable_delay:
      name: Délai avant alerte d'inaccessibilité
      description: Temps d'attente avant de considérer que la vanne est réellement hors ligne (évite les fausses alertes)
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: minutes

    # --------------------------------------------------------------------------
    # Activer les notifications : permet de désactiver temporairement les alertes
    # Type attendu : booléen
    # Valeur attendue : true = notifications activées, false = désactivées
    # --------------------------------------------------------------------------
    enable_notification:
      name: Activer les notifications
      description: Désactiver temporairement les notifications sans supprimer l'automatisation
      default: true
      selector:
        boolean:

# ==============================================================================
# MODE SINGLE : Une seule exécution à la fois (notifications uniques)
# ==============================================================================
mode: single
max_exceeded: silent

# ==============================================================================
# TRIGGERS : Événements qui déclenchent l'automation
# ==============================================================================
trigger:
  # --------------------------------------------------------------------------
  # Trigger 1 : Vanne débranchée/dévissée
  # Se déclenche quand : mounted_mode_active passe à off
  # Objectif : détecter que la vanne n'est plus montée sur le radiateur
  # --------------------------------------------------------------------------
  - platform: state
    entity_id: !input vanne_entity
    to: "off"
    id: unmounted

  # --------------------------------------------------------------------------
  # Trigger 2 : Vanne inaccessible (optionnel)
  # Se déclenche quand : la vanne devient unavailable pendant X minutes
  # Objectif : détecter une panne de pile ou de connexion Zigbee
  # --------------------------------------------------------------------------
  - platform: state
    entity_id: !input vanne_entity
    to: "unavailable"
    for:
      minutes: !input unavailable_delay
    id: unavailable

# ==============================================================================
# CONDITION : Vérifications avant exécution
# ==============================================================================
condition:
  - condition: template
    value_template: !input enable_notification

# ==============================================================================
# VARIABLES : Préparation des données pour les notifications
# ==============================================================================
variables:
  vanne_name: !input vanne_name
  unavailable_delay: !input unavailable_delay
  notify_device: !input notify_device
  notify_service: >
    notify.mobile_app_{{ device_attr(notify_device, 'name')
      | lower
      | replace(' ', '_')
      | replace('-', '_') }}

action:
  - choose:
      # Cas 1 : Vanne débranchée/dévissée
      - conditions:
          - condition: trigger
            id: unmounted
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "⚠️ VANNE DÉBRANCHÉE"
              message: >
                🔧 VANNE DÉMONTÉE DÉTECTÉE
                📍 {{ vanne_name }}

                Le capteur de montage indique que la vanne n'est plus installée correctement.

                ✅ Vérifiez que :
                • La vanne est bien vissée sur le radiateur
                • Elle n'est pas tombée
                • Le bouton central a été pressé pour lancer la calibration
              data:
                tag: "vanne_{{ vanne_name | slugify }}_unmounted"
                notification_icon: mdi:radiator-off
                push:
                  sound:
                    name: default
                    critical: 1
                    volume: 1.0
                ttl: 0
                priority: high

          - service: logbook.log
            data:
              name: "Surveillance Vanne Danfoss"
              message: "La vanne {{ vanne_name }} a été détectée comme débranchée"
              entity_id: !input vanne_entity

      # Cas 2 : Vanne inaccessible
      - conditions:
          - condition: trigger
            id: unavailable
          - condition: template
            value_template: !input check_unavailable
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "🔴 VANNE INACCESSIBLE"
              message: >
                📡 PERTE DE CONNEXION
                📍 {{ vanne_name }}
                ⏱️ Hors ligne depuis {{ unavailable_delay }} min

                ⚠️ Causes possibles :
                • Pile faible ou déchargée
                • Problème de connexion Zigbee
                • Vanne hors de portée du réseau

                ➡️ Vérifiez l'état de la vanne et sa connexion.
              data:
                tag: "vanne_{{ vanne_name | slugify }}_unavailable"
                notification_icon: mdi:access-point-network-off
                push:
                  sound:
                    name: default
                    critical: 1
                    volume: 1.0
                ttl: 0
                priority: high

          - service: logbook.log
            data:
              name: "Surveillance Vanne Danfoss"
              message: "La vanne {{ vanne_name }} est inaccessible"
              entity_id: !input vanne_entity
