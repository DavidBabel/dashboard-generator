blueprint:
  name: "👮 Beacon abandonné dans l'appartement"
  description: "Bascule en Frost si le beacon est immobile. Analyse via Ratio Stats."
  domain: automation
  # TODO a changer vers "desactiver le chauffage" plutot que "frost"

  # ==============================================================================
  # INPUTS - Configuration des paramètres du blueprint
  # ==============================================================================
  input:
    # --------------------------------------------------------------------------
    # Capteur de statistique : ratio de présence calculé
    # Type attendu : sensor.xxx de l'intégration statistics
    # Valeur attendue : ratio entre 0 et 1 (0 = jamais présent, 1 = toujours présent)
    # Créer via : Configuration.yaml avec platform: statistics
    # --------------------------------------------------------------------------
    ratio_sensor:
      name: Capteur de statistique (ratio présence)
      description: "Filtre : Affiche uniquement les capteurs de l'intégration 'Statistics'."
      selector:
        entity:
          domain: sensor
          integration: statistics

    # --------------------------------------------------------------------------
    # Seuil de présence : pourcentage au-delà duquel on considère le beacon immobile
    # Type attendu : input_number.xxx (Helper > Number)
    # Valeur attendue : pourcentage entre 0 et 100 (recommandé : 95%)
    # Créer via UI : Settings > Helpers > Create Helper > Number
    # --------------------------------------------------------------------------
    input_seuil_percent:
      name: Seuil de présence (%)
      default: input_number.pourcentage_de_presence_beacon_abandonne
      selector:
        entity:
          domain: input_number

    # --------------------------------------------------------------------------
    # Thermostat cible : VT à basculer en mode hors-gel
    # Type attendu : climate.xxx de l'intégration versatile_thermostat
    # Valeur attendue : entité climat avec support preset_mode = frost
    # --------------------------------------------------------------------------
    target_thermostat:
      name: Versatile Thermostat
      selector:
        entity:
          domain: climate
          integration: versatile_thermostat

    # --------------------------------------------------------------------------
    # Nom du site : identification de l'appartement
    # Type attendu : sélection parmi les options définies
    # Valeur attendue : nom du site
    # --------------------------------------------------------------------------
    site_name:
      name: Nom du Site
      selector:
        select:
          options:
            - Romains
            - Engel

    # --------------------------------------------------------------------------
    # URL du dashboard : lien vers la chambre concernée
    # Type attendu : URL de dashboard Home Assistant
    # Valeur attendue : chemin vers la vue dashboard
    # --------------------------------------------------------------------------
    dashboard_url:
      name: URL du Dashboard (Chambre)
      default: "/dashboard-engelbreit/chambre-salon"
      selector:
        select:
          options:
            - label: "Romains - Chambre Cuisine"
              value: "/dashboard-romains/chambre-cuisine"
            - label: "Romains - Chambre Cellier"
              value: "/dashboard-romains/chambre-cellier"
            - label: "Romains - Chambre Balcon"
              value: "/dashboard-romains/chambre-balcon"
            - label: "Romains - Chambre Grande Gauche"
              value: "/dashboard-romains/chambre-grande-gauche"
            - label: "Romains - Chambre Grande Droite"
              value: "/dashboard-romains/chambre-grande-droite"
            - label: "Engel - Chambre Salon"
              value: "/dashboard-engelbreit/chambre-salon"
            - label: "Engel - Chambre Sud"
              value: "/dashboard-engelbreit/chambre-sud"
            - label: "Engel - Chambre Ouest"
              value: "/dashboard-engelbreit/chambre-ouest"
            - label: "Engel - Chambre Nord"
              value: "/dashboard-engelbreit/chambre-nord"
          custom_value: true

    # --------------------------------------------------------------------------
    # Device de notification : appareil mobile recevant les alertes
    # Type attendu : device avec l'app mobile Home Assistant installée
    # --------------------------------------------------------------------------
    notify_device:
      name: Device à notifier
      description: >
        Le device doit utiliser l'application mobile officielle Home Assistant.
      selector:
        device:
          filter:
            integration: mobile_app

# ==============================================================================
# VARIABLES : Préparation des données pour les conditions et actions
# ==============================================================================
variables:
  ratio_ent: !input ratio_sensor
  seuil_ent: !input input_seuil_percent
  thermostat_ent: !input target_thermostat
  site: !input site_name
  url_val: !input dashboard_url

  notify_device: !input notify_device
  notify_service: >
    notify.mobile_app_{{ device_attr(notify_device, 'name')
      | lower
      | replace(' ', '_')
      | replace('-', '_') }}

# ==============================================================================
# TRIGGER : Vérification périodique toutes les 3 heures
# ==============================================================================
trigger:
  # --------------------------------------------------------------------------
  # Trigger : Vérification automatique
  # Se déclenche quand : toutes les 3 heures
  # Objectif : détecter un beacon oublié (présence prolongée anormale)
  # --------------------------------------------------------------------------
  - platform: time_pattern
    hours: "/3"

# ==============================================================================
# CONDITIONS : Vérifications avant d'exécuter l'action
# ==============================================================================
condition:
  # 1. Capteur de stats valide
  - condition: template
    value_template: "{{ states(ratio_ent) not in ['unknown', 'unavailable', ''] }}"

  # 2. Ratio >= seuil
  - condition: template
    value_template: >
      {% set ratio = states(ratio_ent) | float(0) %}
      {% set seuil = states(seuil_ent) | float(95) / 100 %}
      {{ ratio >= seuil }}

  # 3. Thermostat pas déjà en hors-gel
  - condition: template
    value_template: >
      {{ state_attr(thermostat_ent, 'preset_mode') != 'frost' }}

action:
  - service: climate.set_preset_mode
    target:
      entity_id: !input target_thermostat
    data:
      preset_mode: frost

  - service: "{{ notify_service }}"
    data:
      title: "🔥 Présence prolongée {{ site }}"
      message: >
        {% set path = url_val[1:] if url_val.startswith('/') else url_val %}
        {% set room = (path.split('/')[-1]) | replace('-', ' ') | replace('_', ' ') %}
        Présence détectée à {{ (states(ratio_ent)|float * 100)|round(1) }} % dans {{ room }}.
      data:
        notification_icon: mdi:home-thermometer
        icon: mdi:snowflake-alert
        color: "#FFA500"
        clickAction: !input dashboard_url
        url: !input dashboard_url
