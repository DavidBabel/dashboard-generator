# Version: 1.2.5
# 🧪 to test : fix lost beacon script
# Appartement: Tous
blueprint:
  name: "🕵️ Beacon abandonné dans l'appartement"
  description: >
    Version: 1.2.5
    Désactive complètement le chauffage (preset frost) si le beacon est immobile.
    Le scheduler VT est suspendu pendant l'arrêt.
  domain: automation
  # ==============================================================================
  # INPUTS - Configuration des paramètres du blueprint
  # ==============================================================================
  input:
    # --------------------------------------------------------------------------
    # Capteur de statistique : ratio de présence calculé
    # Type attendu : sensor.xxx de l'intégration statistics
    # Valeur attendue : ratio entre 0 et 1 (0 = jamais présent, 1 = toujours présent)
    # Créer via : Configuration.yaml avec platform: statistics
    # --------------------------------------------------------------------------
    ratio_sensor:
      name: Capteur de statistique (ratio présence)
      description: "Filtre : Affiche uniquement les capteurs de l'intégration 'Statistics'."
      selector:
        entity:
          domain: sensor
          integration: statistics

    # --------------------------------------------------------------------------
    # Seuil de présence : pourcentage au-delà duquel on considère le beacon immobile
    # Type attendu : input_number.xxx (Helper > Number)
    # Valeur attendue : pourcentage entre 0 et 100 (recommandé : 95%)
    # Créer via UI : Settings > Helpers > Create Helper > Number4
    # --------------------------------------------------------------------------
    input_seuil_percent:
      name: Seuil de présence (%)
      default: input_number.pourcentage_de_presence_beacon_abandonne
      selector:
        entity:
          domain: input_number

    # --------------------------------------------------------------------------
    # Thermostat cible : VT à basculer en frost
    # Type attendu : climate.xxx de l'intégration versatile_thermostat
    # Valeur attendue : entité climat avec preset_mode = comfort / frost
    # --------------------------------------------------------------------------
    target_thermostat:
      name: Versatile Thermostat
      selector:
        entity:
          domain: climate
          integration: versatile_thermostat

    # --------------------------------------------------------------------------
    # Appartement : identification de l'appartement
    # Type attendu : sélection parmi les options définies
    # Valeur attendue : emoji + nom d'appartement
    # --------------------------------------------------------------------------
    appartement:
      name: Appartement
      default: "🟧 Engel"
      selector:
        select:
          options:
            - "🟧 Engel"
            - "🟩 Romains"

    # --------------------------------------------------------------------------
    # Device de notification : appareil mobile recevant les alertes
    # --------------------------------------------------------------------------
    notify_device:
      name: Device à notifier
      description: >
        Le device doit utiliser l'application mobile officielle Home Assistant.
      selector:
        device:
          filter:
            integration: mobile_app

# ==============================================================================
# VARIABLES : Préparation des données pour les conditions et actions
# ==============================================================================
variables:
  ratio_ent: !input ratio_sensor
  seuil_ent: !input input_seuil_percent
  thermostat_ent: !input target_thermostat
  appartement_input: !input appartement

  # Extraction de l'identifiant de chambre depuis le thermostat
  # Format: chauffage_vt_engel_chambre_nord → nord
  # Format: chauffage_vt_engel_chambre_grande_droite → grande_droite
  identifiant_chambre: >
    {% set entity = thermostat_ent %}
    {% set parts = entity.split('_') %}
    {% set chambre_index = parts.index('chambre') if 'chambre' in parts else -1 %}
    {% if chambre_index >= 0 and chambre_index < parts|length - 1 %}
      {% set chambre_parts = parts[chambre_index + 1:] %}
      {{ chambre_parts | join('_') }}
    {% else %}
      unknown
    {% endif %}

  # Construction de l'URL du dashboard
  dashboard_url: >
    /dashboard-chauffage/chambre_{{ identifiant_chambre }}

  # Extraction du nom de la chambre pour affichage
  chambre_nom: >
    {% set chambre = identifiant_chambre %}
    {% set mots = chambre.replace('_', ' ').split(' ') %}
    {% set formatted = mots | map('capitalize') | join(' ') %}
    {{ formatted }}

  notify_device: !input notify_device
  notify_service: >
    notify.mobile_app_{{ device_attr(notify_device, 'name')
      | lower
      | replace(' ', '_')
      | replace('-', '_') }}

# ==============================================================================
# TRIGGERS : Vérification périodique
# ==============================================================================
trigger:
  # Vérification automatique toutes les 3 heures
  - platform: time_pattern
    id: check
    hours: "/1"

# ==============================================================================
# ACTIONS
# ==============================================================================
action:
  # Debug logs pour vérifier les variables calculées
  - service: system_log.write
    data:
      message: >
        [Beacon Forgotten Debug]
        Thermostat: {{ thermostat_ent }}
        Appartement: {{ appartement_input }}
        Identifiant Chambre: {{ identifiant_chambre }}
        Dashboard URL: {{ dashboard_url }}
        Chambre Nom: {{ chambre_nom }}
      level: info

  - choose:
      # ----------------------------------------------------------------------
      # CAS 1 : Beacon immobile → Passage en frost
      # ----------------------------------------------------------------------
      - conditions:
          - condition: template
            value_template: "{{ states(ratio_ent) not in ['unknown', 'unavailable', ''] }}"
          - condition: template
            value_template: >
              {% set ratio = states(ratio_ent) | float(0) %}
              {% set seuil = states(seuil_ent) | float(95) %}
              {{ ratio >= seuil }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "📶 Beacon {{ appartement_input }}"
              message: >
                📍 {{ chambre_nom }} Beacon Abandonné
                🔒 Chauffage passé en mode Frost
              data:
                icon: mdi:snowflake-alert
                url: "{{ dashboard_url }}"

          - service: climate.set_preset_mode
            target:
              entity_id: !input target_thermostat
            data:
              preset_mode: frost
