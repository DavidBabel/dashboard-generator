# Version: 1.0.0
# Appartement: Romains
blueprint:
  name: "🕵️ Warning – Capteur de Présence Potentiellement Caché"
  description: >
    Envoie une alerte lorsqu'un capteur de présence détecte très peu d'activité
    pendant plusieurs jours (indicateur qu'il est peut-être caché ou défaillant).
  domain: automation
  # ==============================================================================
  # INPUTS - Configuration des paramètres du blueprint
  # ==============================================================================
  input:
    # --------------------------------------------------------------------------
    # Sensor de statistiques : calcule la moyenne de détection
    # Type attendu : sensor.xxx créé via "statistics" dans configuration.yaml
    # Valeur attendue : pourcentage entre 0 et 100
    # --------------------------------------------------------------------------
    presence_statistics_sensor:
      name: Capteur de statistiques de présence
      description: >
        Le sensor de type "statistics" qui calcule la moyenne de détection
        (créez-le d'abord avec la config ci-dessus)
      default: sensor.presence_romains_detection_stats
      selector:
        entity:
          domain: sensor

    # --------------------------------------------------------------------------
    # Seuil de présence : valeur de référence pour comparer le sensor
    # Type attendu : input_number.xxx (Helper > Number)
    # Valeur attendue : pourcentage entre 0 et 100
    # Créer via UI : Settings > Devices & Services > Helpers > Create Helper > Number
    # --------------------------------------------------------------------------
    presence_threshold:
      name: Seuil de présence minimum (%)
      description: >
        Si la moyenne de détection est inférieure à ce pourcentage pendant
        la durée configurée, une alerte sera envoyée
      default: input_number.seuil_presence_minimum_romains
      selector:
        entity:
          domain: input_number

    # --------------------------------------------------------------------------
    # Durée avant alerte : temps d'attente avant notification
    # --------------------------------------------------------------------------
    check_duration:
      name: Durée de surveillance
      description: >
        Temps pendant lequel le pourcentage doit rester sous le seuil
        avant d'envoyer l'alerte
      default: 2
      selector:
        number:
          min: 1
          max: 10
          unit_of_measurement: jours

    # --------------------------------------------------------------------------
    # Device de notification : appareil mobile recevant les alertes
    # Type attendu : device avec l'app mobile Home Assistant installée
    # --------------------------------------------------------------------------
    notify_device:
      name: Device à notifier
      description: >
        Le device doit utiliser l'application mobile officielle Home Assistant.
      selector:
        device:
          filter:
            integration: mobile_app

# ==============================================================================
# MODE RESTART : Redémarre l'automation si elle se déclenche pendant son exécution
# ==============================================================================
mode: restart

# ==============================================================================
# VARIABLES : Préparation des données pour les triggers et actions
# ==============================================================================
variables:
  # Service de notification dynamique basé sur le nom du device
  notify_device: !input notify_device
  notify_service: >
    notify.mobile_app_{{ device_attr(notify_device, 'name')
      | lower
      | replace(' ', '_')
      | replace('-', '_') }}

  # Sensor de statistiques et extraction du nom convivial
  presence_stats_sensor: !input presence_statistics_sensor
  sensor_name: >
    {{ state_attr(presence_stats_sensor, 'friendly_name') | default(presence_stats_sensor.split('.')[1] | replace('_', ' ') | title) }}

  # Seuil de présence et sa valeur actuelle
  presence_threshold_entity: !input presence_threshold
  presence_threshold_value: "{{ states(presence_threshold_entity) | float }}"

  # Durée de surveillance
  check_duration: !input check_duration

  # Tag unique pour gérer les notifications
  notification_tag: "alerte_presence_{{ presence_stats_sensor | replace('.', '_') }}"

# ==============================================================================
# TRIGGERS : Événements qui déclenchent l'automation
# ==============================================================================
trigger:
  # --------------------------------------------------------------------------
  # Trigger 1 : Changement de la valeur du sensor de statistiques
  # Permet de réagir immédiatement quand le pourcentage évolue
  # --------------------------------------------------------------------------
  - platform: state
    entity_id: !input presence_statistics_sensor
    id: changement_sensor

  # --------------------------------------------------------------------------
  # Trigger 2 : Changement de la valeur du seuil
  # Permet de réévaluer immédiatement si le seuil est modifié
  # --------------------------------------------------------------------------
  - platform: state
    entity_id: !input presence_threshold
    id: changement_seuil

  # --------------------------------------------------------------------------
  # Trigger 3 : Détection faible prolongée
  # Se déclenche si le sensor reste sous le seuil pendant X jours
  # --------------------------------------------------------------------------
  - platform: template
    value_template: >
      {{ states(presence_stats_sensor) | float < states(presence_threshold_entity) | float }}
    for:
      days: !input check_duration
    id: faible_detection

# ==============================================================================
# ACTIONS : Ce qui se passe quand un trigger se déclenche
# ==============================================================================
action:
  - choose:
      # ------------------------------------------------------------------------
      # SCÉNARIO 1 : Alerte de faible détection
      # Se déclenche après X jours de détection sous le seuil
      # ------------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: faible_detection
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "⚠️ {{ sensor_name }}"
              message: >
                Le capteur détecte très peu d'activité (< {{ presence_threshold_value }}%)
                depuis {{ check_duration }} jours. Il est peut-être caché ou défaillant.
              data:
                notification_icon: mdi:motion-sensor-off
                tag: "{{ notification_tag }}"
                url: /batteries-check/
                clickAction: /batteries-check/
                actions:
                  - action: "URI"
                    title: "Voir capteurs"
                    uri: "/batteries-check/"

      # ------------------------------------------------------------------------
      # SCÉNARIO 2 : Retour à la normale
      # Se déclenche quand le sensor ou le seuil change ET que la valeur
      # repasse au-dessus du seuil (uniquement dans les 24h après une alerte)
      # ------------------------------------------------------------------------
      - conditions:
          # Le trigger doit être un changement de sensor ou de seuil
          - condition: or
            conditions:
              - condition: trigger
                id: changement_sensor
              - condition: trigger
                id: changement_seuil

          # La valeur actuelle doit être >= au seuil (retour à la normale)
          - condition: template
            value_template: >
              {{ states(presence_stats_sensor) | float >= states(presence_threshold_entity) | float }}

          # Vérifie qu'une alerte a été envoyée dans les dernières 24h
          # (évite les notifications inutiles)
          - condition: template
            value_template: >
              {{ (now() - states[notification_tag.replace('alerte_presence_', '').replace('_', '.')].last_changed).total_seconds() < 86400 }}
        sequence:
          - service: "{{ notify_service }}"
            data:
              title: "✅ {{ sensor_name }}"
              message: "Le capteur détecte à nouveau une activité normale"
              data:
                notification_icon: mdi:motion-sensor
                tag: "{{ notification_tag }}"
                url: /batteries-check/
                clickAction: /batteries-check/
