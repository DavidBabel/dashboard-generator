title: 🛌 Chambre Salon
badges: []
header:
  layout: responsive
  badges_position: bottom
  badges_wrap: wrap
sections:
  - type: grid
    cards:
      - type: heading
        heading: Versatile Thermostats
        heading_style: title
        icon: mdi:brain
      - type: custom:versatile-thermostat-ui-card
        entity: climate.chauffage_vt_engel_chambre_salon
        name: 🛌 Salon
        disable_name: false
        disable_circle: false
        disable_window: false
        disable_autoStartStop: false
        disable_overpowering: false
        disable_heat: false
        disable_cool: false
        disable_heat_cool: false
        disable_auto: false
        disable_dry: false
        allow_lock_toggle: true
        disable_target_icon: false
        disable_auto_fan_infos: true
        set_current_as_main: false
        disable_off: false
        disable_fan_only: true
        disable_menu: false
        disable_sleep: false
        disable_safety_warning: false
        disable_buttons: false
        disable_power_infos: true
  - type: grid
    cards:
      - type: heading
        heading: Versatile Thermostats
        heading_style: title
        icon: mdi:home
      - type: tile
        grid_options:
          columns: 12
          rows: 1
        entity: binary_sensor.chauffage_vt_engel_chambre_salon_presence_state
        name: 🛌 Salon
        icon: mdi:home-account
        show_entity_picture: false
        hide_state: false
        state_content:
          - state
          - last_updated
        vertical: false
        features_position: bottom
      - type: conditional
        conditions:
          - entity: sensor.bouton_engel_chambre_salon_batterie
            state_not: unavailable
          - entity: sensor.bouton_engel_chambre_salon_batterie
            state_not: unknown
        card:
          type: tile
          grid_options:
            columns: 12
            rows: 1
          entity: sensor.bouton_engel_chambre_salon_batterie
          state_content:
            - state
            - last_updated
          vertical: false
          features_position: bottom
      - type: tile
        grid_options:
          columns: 12
          rows: 1
        entity: sensor.chauffage_engel_chambre_salon_battery
        state_content:
          - state
          - last_updated
        vertical: false
        features_position: bottom
      - chart_type: line
        period: 5minute
        type: statistics-graph
        entities:
          - entity: sensor.chauffage_vt_engel_chambre_salon_ema_temperature
            name: Temp. Lissée (EMA)
          - entity: sensor.chauffage_vt_engel_chambre_salon_regulated_temperature
            name: Temp. Consigne
          - entity: sensor.temperature_engel_chambre_salon
            name: Temp. Chambre
          - sensor.strasbourg_temperature
        stat_types:
          - mean
        hide_legend: false
        logarithmic_scale: false
        grid_options:
          columns: 36
          rows: 5
        days_to_show: 4
        min_y_axis: 0
        fit_y_data: true
        max_y_axis: 25
    column_span: 3
  - type: grid
    cards:
      - type: heading
        heading: Thermostats HA
        heading_style: title
        icon: mdi:thermometer
      - type: thermostat
        entity: climate.chauffage_engel_chambre_salon
        show_current_as_primary: false
        grid_options:
          columns: 12
          rows: 5
      - show_current: false
        show_forecast: true
        type: weather-forecast
        entity: weather.strasbourg
        forecast_type: hourly
        forecast_slots: 6
        grid_options:
          columns: 12
          rows: 2
  - type: grid
    cards:
      - type: heading
        heading: Timeline
        heading_style: title
        icon: mdi:clipboard-text-clock
      - type: history-graph
        entities:
          - entity: binary_sensor.chauffage_vt_engel_chambre_salon_presence_state
            name: Locataire 🗝️
          - entity: binary_sensor.telephone_engel_chambre_salon
            name: Locataire 📱
          - entity: sensor.chauffage_vt_engel_chambre_salon_mode
            name: Mode 🌡️
          - entity: binary_sensor.chauffage_vt_engel_chambre_salon_window_state
            name: Fenêtre 🪟
          - entity: climate.chauffage_engel_chambre_salon
            name: 🛌 Salon
          - entity: sensor.strasbourg_temperature
            name: Temperature exterieure
          - entity: input_select.automation_vt_engel_chambre_salon_events
            name: 🤖 Automation
          - entity: sensor.temperature_engel_chambre_salon_temperature
            name:
              - type: text
                text: 🌡️
              - type: text
                text: Capteur
        grid_options:
          rows: 8
          columns: full
        logarithmic_scale: false
        hours_to_show: 24
        min_y_axis: 0
        fit_y_data: true
        max_y_axis: 25
    column_span: 3
  - type: grid
    cards:
      - type: heading
        icon: mdi:account
        heading: Présence Mensuelle
        heading_style: title
      - type: history-graph
        entities:
          - entity: binary_sensor.locataire_engel_chambre_salon_present
            name:
              - type: text
                text: 🔑
              - type: area
          - entity: binary_sensor.telephone_engel_chambre_salon
            name:
              - type: text
                text: 📱
              - type: area
        grid_options:
          columns: full
        hours_to_show: 720
    column_span: 4
  - type: grid
    cards:
      - type: heading
        heading: Plannification Partagée
        heading_style: title
        icon: mdi:calendar
      - type: custom:scheduler-card
        default_editor: scheme
        title: Planning chauffage
        display_options:
          secondary_info:
            - relative-time
            - days
            - time
          primary_info: default
        grid_options:
          columns: full
          rows: 3
        show_header_toggle: false
        sort_by:
          - state
          - relative-time
    column_span: 2
  - type: grid
    cards:
      - type: heading
        heading: Reset automatique du chauffage
        heading_style: title
      - type: tile
        grid_options:
          rows: 2
          columns: full
        entity: automation.reset_temperature_chambre_salon
        name: Automatisme 🛌 🛌 Chambre Salon
        icon: mdi:thermometer-auto
        color: orange
        vertical: true
        tap_action:
          action: toggle
        features_position: bottom
    column_span: 2
type: sections
icon: ""
cards: []
max_columns: 4
path: chambre_salon
